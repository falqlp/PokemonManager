# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - PokemonManager

on:
  push:
    branches:
      - prod
  workflow_dispatch:
#test
env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend'
  AZURE_FUNCTIONAPP_PACKAGE_PATH_DIST: 'backend'
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies Using Npm'
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm run build --if-present
          npm run test --if-present
          popd

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'PokemonManager'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH_DIST }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C9060844F30C40DCB7F2D77F8229EFCF }}
